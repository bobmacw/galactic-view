<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galactic Geometry — Interactive 3D</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Space+Mono:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --void: #03040c;
    --panel: rgba(5, 8, 18, 0.92);
    --border: rgba(255,255,255,0.08);
    --label: #8a9ab8;
    --bright: #e8eef8;
  }

  body {
    background: var(--void);
    color: var(--bright);
    font-family: 'Space Mono', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
  }

  /* star field */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      radial-gradient(1px 1px at 7%  13%, rgba(255,255,255,0.55) 0%, transparent 100%),
      radial-gradient(1px 1px at 19% 47%, rgba(255,255,255,0.40) 0%, transparent 100%),
      radial-gradient(1px 1px at 34%  8%, rgba(255,255,255,0.50) 0%, transparent 100%),
      radial-gradient(1px 1px at 51% 68%, rgba(255,255,255,0.35) 0%, transparent 100%),
      radial-gradient(1px 1px at 63% 28%, rgba(255,255,255,0.60) 0%, transparent 100%),
      radial-gradient(1px 1px at 78% 82%, rgba(255,255,255,0.40) 0%, transparent 100%),
      radial-gradient(1px 1px at 88% 15%, rgba(255,255,255,0.50) 0%, transparent 100%),
      radial-gradient(1px 1px at 12% 75%, rgba(255,255,255,0.45) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 43% 55%, rgba(255,255,255,0.30) 0%, transparent 100%),
      radial-gradient(1px 1px at 95% 40%, rgba(255,255,255,0.55) 0%, transparent 100%),
      radial-gradient(1px 1px at 26% 90%, rgba(255,255,255,0.35) 0%, transparent 100%),
      radial-gradient(1px 1px at 72% 62%, rgba(255,255,255,0.45) 0%, transparent 100%);
    pointer-events: none; z-index: 0;
  }

  header {
    position: relative; z-index: 2;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    flex-shrink: 0;
  }

  .header-info {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    line-height: 1.5;
    color: rgba(200, 212, 232, 0.85);
    text-align: center;
    width: 34em;
    text-wrap: balance;
  }
  .header-info-sub {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.0rem;
    line-height: 1.5;
    color: rgba(200, 212, 232, 0.85);
    text-align: center;
    margin-top: 0.25em;
  }

  .header-planes {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex-shrink: 0;
  }

  header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 1.35rem;
    letter-spacing: 0.04em;
    color: #fff;
    white-space: nowrap;
  }

  header h1 em { font-style: italic; color: #e8c87a; }

  header p {
    font-size: 0.6rem;
    letter-spacing: 0.14em;
    color: var(--label);
    text-transform: uppercase;
  }

  .version-display {
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    color: rgba(138, 154, 184, 0.75);
    text-align: left;
    margin-top: 4px;
    font-family: 'Space Mono', monospace;
  }


  /* Main layout */
  .main {
    flex: 1;
    display: flex;
    position: relative;
    z-index: 1;
    overflow: hidden;
  }

  /* Canvas */
  #canvas {
    flex: 1;
    min-width: 0;  /* Safari: allow canvas to shrink below its intrinsic pixel width */
    display: block;
    cursor: grab;
  }
  #canvas:active { cursor: grabbing; }

  /* Legend items */
  .leg-item {
    display: flex;
    align-items: center;
    gap: 9px;
    margin-bottom: 8px;
    font-size: 0.80rem;
    color: var(--label);
    line-height: 1.4;
    white-space: nowrap;
  }

  .leg-swatch {
    width: 22px; height: 3px; flex-shrink: 0; border-radius: 2px;
  }

  .leg-swatch.dashed {
    background: repeating-linear-gradient(
      90deg, currentColor 0px, currentColor 4px, transparent 4px, transparent 8px
    );
    height: 2px;
  }

  .leg-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }

</style>
</head>
<body>

<header>
  <div>
    <h1>Galactic Geometry — <em>Interactive</em></h1>
    <p>Observer at 42°N · Drag to rotate · Scroll to zoom</p>
    <div class="version-display" id="versionDisplay"></div>
  </div>
  <div class="header-info">
    Rotate to find where each seasonal arrow is clearest. The arrows are fixed in space — only the viewpoint changes.
    <div class="header-info-sub">S/SW = compass direction to face — ↑ = look overhead</div>
  </div>
  <div class="header-planes">
    <div class="leg-item">
      <div class="leg-swatch" style="background: rgba(245,166,35,0.9);"></div>
      Galactic plane
    </div>
    <div class="leg-item">
      <div class="leg-swatch dashed" style="color: rgba(165,214,167,0.8);"></div>
      Ecliptic plane (Earth's orbit)
    </div>
  </div>
</header>

<div class="main">
  <canvas id="canvas"></canvas>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
//  VERSION  — update this single constant for each release
//  Scheme: Major.Minor.Patch
//    Major — significant new features or UI overhaul
//    Minor — a few new features or major bug fixes
//    Patch — minor bug fixes, smallest increment
// ═══════════════════════════════════════════════════════════════
// Simplify earth rendering - remove axix and poles, show shade instead.
const VERSION = "1.7.1"; // Simplify Winter and Spring season name labels
document.getElementById('versionDisplay').textContent = `v${VERSION}`;
// ═══════════════════════════════════════════════════════════════
//  3D MATH
// ═══════════════════════════════════════════════════════════════

function rotateY(v, a) {
  return [
     v[0]*Math.cos(a) + v[2]*Math.sin(a),
     v[1],
    -v[0]*Math.sin(a) + v[2]*Math.cos(a)
  ];
}
function rotateX(v, a) {
  return [
    v[0],
    v[1]*Math.cos(a) - v[2]*Math.sin(a),
    v[1]*Math.sin(a) + v[2]*Math.cos(a)
  ];
}
function project(v, scale, ox, oy) {
  // Simple perspective projection — depth adds slight foreshortening
  const fov = 900;
  const z = v[2] + fov;
  const s = fov / z * scale;
  return [ ox + v[0]*s, oy - v[1]*s, v[2] ]; // -y so +Y is up
}
function normalize(v) {
  const l = Math.sqrt(v[0]*v[0]+v[1]*v[1]+v[2]*v[2]);
  return l ? [v[0]/l, v[1]/l, v[2]/l] : v;
}
function scale3(v, s) { return [v[0]*s, v[1]*s, v[2]*s]; }
function add3(a, b) { return [a[0]+b[0], a[1]+b[1], a[2]+b[2]]; }
function dot3(a, b) { return a[0]*b[0]+a[1]*b[1]+a[2]*b[2]; }
function cross3(a, b) {
  return [
    a[1]*b[2]-a[2]*b[1],
    a[2]*b[0]-a[0]*b[2],
    a[0]*b[1]-a[1]*b[0]
  ];
}

// Apply current rotation to a vector
function applyRot(v, rx, ry) {
  return rotateX(rotateY(v, ry), rx);
}

// ═══════════════════════════════════════════════════════════════
//  GEOMETRY DEFINITIONS  (all in galactic coordinates)
//  +Y = galactic north
//  +X = anti-core direction
//  +Z = toward viewer in default pose
// ═══════════════════════════════════════════════════════════════

const DEG = Math.PI/180;

// Ecliptic tilted 60° to galactic plane
// We tilt around the X axis — ecliptic normal = (0, cos60, -sin60)
const ECL_TILT = 60*DEG;
const eclNormal = normalize([0, Math.cos(ECL_TILT), -Math.sin(ECL_TILT)]);
// = [0, 0.5, -0.866]

// Earth's rotation axis: 23.5° from ecliptic normal, tilted toward +X.
// Correct construction: start from ecliptic normal and rotate 23.5° toward +X.
// We rotate eclNormal by AXIS_TILT around the Z axis (which tilts it toward +X):
//   rotAxisN = eclNormal rotated 23.5° toward +X in the XY plane
// eclNormal = (0, cos60, -sin60)
// Rotating toward +X by 23.5°:
//   x' = 0·cos(23.5°) - ... actually simplest: rotate the Y component toward X
// In the YX plane: new_x = eclNy·sin(AXIS_TILT), new_y = eclNy·cos(AXIS_TILT)
// Z component unchanged.
const AXIS_TILT = 23.5*DEG;
const rotAxisN = normalize([
  Math.cos(ECL_TILT) * Math.sin(AXIS_TILT),   // x: eclNy · sin(23.5°)
  Math.cos(ECL_TILT) * Math.cos(AXIS_TILT),   // y: eclNy · cos(23.5°)
 -Math.sin(ECL_TILT)                           // z: unchanged from ecliptic normal
]);
const rotAxisS = scale3(rotAxisN, -1);

// Earth/Sun position: ~58% from galactic centre toward anti-core (+X)
// In normalised units where galactic disk radius = 1.0
// We place Earth+Sun system at x=0.58 in the galactic plane.
// The sun and Earth are essentially at the same location at galactic scale —
// the orbit is tiny relative to the disk, but we render it large enough to see.
const EARTH_POS = [0.58, 0, 0];  // normalised galactic coords
const SUN_POS   = [0.58, 0, 0];  // sun coincides with Earth at galactic scale
const CORE_POS  = [0,    0, 0];  // galactic centre

// ── Galactic disk ──────────────────────────────────────────────
function makeDisc(cx, cy, cz, rx, rz, n) {
  // Ellipse in the XZ plane (galactic plane, y=0)
  const pts = [];
  for (let i = 0; i <= n; i++) {
    const a = (i/n)*Math.PI*2;
    pts.push([cx + rx*Math.cos(a), cy, cz + rz*Math.sin(a)]);
  }
  return pts;
}

// ── Ecliptic plane ─────────────────────────────────────────────
// A disc tilted by ECL_TILT around the X axis, centred on Earth
function makeEclipticDisc(centre, r, n) {
  const pts = [];
  for (let i = 0; i <= n; i++) {
    const a = (i/n)*Math.PI*2;
    // Point on circle in XZ plane, then tilt around X by ECL_TILT
    const x = r*Math.cos(a);
    const z = r*Math.sin(a);
    const y2 = -z*Math.sin(ECL_TILT);
    const z2 =  z*Math.cos(ECL_TILT);
    pts.push([centre[0]+x, centre[1]+y2, centre[2]+z2]);
  }
  return pts;
}

// ── Celestial equator ──────────────────────────────────────────
// Circle perpendicular to rotAxisN, centred on Earth
function makeCelestialEquator(centre, r, n) {
  // Two vectors perpendicular to rotAxisN
  const up = [0,1,0];
  let u = cross3(rotAxisN, up);
  if (dot3(u,u) < 0.001) u = cross3(rotAxisN, [1,0,0]);
  u = normalize(u);
  const v = normalize(cross3(rotAxisN, u));
  const pts = [];
  for (let i = 0; i <= n; i++) {
    const a = (i/n)*Math.PI*2;
    pts.push([
      centre[0] + r*(Math.cos(a)*u[0] + Math.sin(a)*v[0]),
      centre[1] + r*(Math.cos(a)*u[1] + Math.sin(a)*v[1]),
      centre[2] + r*(Math.cos(a)*u[2] + Math.sin(a)*v[2])
    ]);
  }
  return pts;
}

// ── Earth orbit around sun ─────────────────────────────────────
// Small ellipse in the ecliptic plane, centred on SUN_POS
function makeOrbit(r, n) {
  return makeEclipticDisc(SUN_POS, r, n);
}

// ── Seasonal Earth positions & night-view arrows ───────────────
// Seasons: Earth orbits sun. The orbit is in the ecliptic plane.
// Season angle = position on ecliptic orbit.
// Night-view = anti-sun direction + galactic-latitude bias.

const SEASONS = [
  {
    name: 'Summer - S', color: '#f5a623',
    // Summer: sun in Gemini/anti-core direction. Earth on core side (-X of sun).
    // Night side faces away from sun = toward core (-X direction).
    // Core sits low in galactic south at 42°N → strong -Y bias.
    orbitAngle: Math.PI,       // Earth at -X side of sun
    galBias: [0, -1.2, 0],     // strongly toward galactic south (-Y)
    quadrant: 'Down / In',
    // Arrow points down → both labels below tip. Name on top (smaller +offset),
    // quadrant directly beneath it. Consistent two-line block for all down arrows.
    labelOffY: 0.07,           // name just below tip (top of two-line block)
    quadrantOffY: 0.14,        // quadrant below name (bottom of two-line block)
  },
  {
    name: 'Autumn - SW', color: '#bf5230',
    // Autumn: Earth at +Z side of ecliptic after tilt → raw anti-sun has -Y component.
    // Core still accessible but setting. Still Down/In — reinforce with strong -Y.
    orbitAngle: Math.PI*0.5,   // Earth at +Z ecliptic → tilts to -Y after ECL_TILT
    galBias: [0, -1.5, 0],     // strongly toward galactic south to overcome tilt
    quadrant: 'Down / In',
    // Arrow points down → same two-line block layout as Summer.
    labelOffY: 0.07,           // name just below tip (top of two-line block)
    quadrantOffY: 0.14,        // quadrant below name (bottom of two-line block)
  },
  {
    name: 'Winter - ↑', color: '#64b5f6',
    // Winter: sun in Sagittarius/core direction. Earth on anti-core side (+X of sun).
    // Night side faces away from sun = toward anti-core (+X).
    // Anti-core rides high toward galactic north at 42°N → strong +Y bias.
    orbitAngle: 0,             // Earth at +X side of sun
    galBias: [0, 1.2, 0],      // strongly toward galactic north (+Y)
    quadrant: 'Up / Out',
    // Arrow points up → both labels above tip. Name on top (more negative offset),
    // quadrant directly beneath it. Consistent two-line block for all up arrows.
    labelOffY: -0.14,          // name further above tip (top of two-line block)
    quadrantOffY: -0.07,       // quadrant just above tip (bottom of two-line block)
  },
  {
    name: 'Spring - ↑', color: '#a5d6a7',
    // Spring: Earth at -Z ecliptic → raw anti-sun has +Y component after tilt.
    // Galactic north pole nearly overhead. Up/Out polar view → strong +Y.
    orbitAngle: Math.PI*1.5,   // Earth at -Z ecliptic → tilts to +Y after ECL_TILT
    galBias: [0, 1.8, 0],      // very strongly toward galactic north pole
    quadrant: 'Up / Out (polar)',
    // Arrow points up → same two-line block layout as Winter.
    labelOffY: -0.14,          // name further above tip (top of two-line block)
    quadrantOffY: -0.07,       // quadrant just above tip (bottom of two-line block)
  },
];

// Compute Earth position on orbit for a given angle
function earthOnOrbit(angle, orbitR) {
  // Orbit in ecliptic plane
  const x = orbitR * Math.cos(angle);
  const z_ecl = orbitR * Math.sin(angle);
  // Tilt by ECL_TILT around X
  const y = -z_ecl * Math.sin(ECL_TILT);
  const z =  z_ecl * Math.cos(ECL_TILT);
  return [SUN_POS[0]+x, SUN_POS[1]+y, SUN_POS[2]+z];
}

// Compute night-view arrow for a season
function nightViewArrow(earthPos, galBias, arrowLen) {
  // Raw anti-sun direction
  const raw = normalize([
    earthPos[0]-SUN_POS[0],
    earthPos[1]-SUN_POS[1],
    earthPos[2]-SUN_POS[2]
  ]);
  // Blend with galactic bias
  const blended = normalize(add3(raw, galBias));
  return add3(earthPos, scale3(blended, arrowLen));
}

// ═══════════════════════════════════════════════════════════════
//  RENDER STATE
// ═══════════════════════════════════════════════════════════════

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// ── Starfield ───────────────────────────────────────────────────
// Generated once at startup. Positions are stored as fractions of
// canvas dimensions (0–1) so the field covers the full canvas at
// any size or orientation without needing to regenerate on resize.
// Size (0.5–1.5 px) and opacity (0.15–0.75) vary randomly to
// suggest differences in stellar brightness.
const STAR_COUNT = 350;
const stars = Array.from({length: STAR_COUNT}, () => ({
  x: Math.random(),
  y: Math.random(),
  r: 0.5 + Math.random(),
  a: 0.15 + Math.random() * 0.60,
}));

// Shallower tilt (rotX) spreads the disc across the full-width canvas;
// rotY gives a gentle perspective angle on the galactic plane.
let rotX = 0.32, rotY = -0.50;
let zoom = 1.0;
let dragging = false, lastX = 0, lastY = 0;
let seasonVisible = [true, true, true, true];

const DEFAULT_RX = 0.32, DEFAULT_RY = -0.50;

// ═══════════════════════════════════════════════════════════════
//  DRAW
// ═══════════════════════════════════════════════════════════════

function W() { return canvas.width; }
function H() { return canvas.height; }
function ox() { return W()*0.5; }
function oy() { return H()*0.5; }

function proj(pt) {
  const r = applyRot(pt, rotX, rotY);
  return project(r, zoom, ox(), oy());
}

function drawArrow(p3from, p3to, color, lineW, headSize) {
  const a = proj(p3from);
  const b = proj(p3to);
  ctx.beginPath();
  ctx.moveTo(a[0], a[1]);
  ctx.lineTo(b[0], b[1]);
  ctx.strokeStyle = color;
  ctx.lineWidth = lineW||2;
  ctx.setLineDash([]);
  ctx.stroke();
  // Arrowhead
  const angle = Math.atan2(b[1]-a[1], b[0]-a[0]);
  const s = headSize||10;
  ctx.beginPath();
  ctx.moveTo(b[0], b[1]);
  ctx.lineTo(b[0]-s*Math.cos(angle-0.38), b[1]-s*Math.sin(angle-0.38));
  ctx.moveTo(b[0], b[1]);
  ctx.lineTo(b[0]-s*Math.cos(angle+0.38), b[1]-s*Math.sin(angle+0.38));
  ctx.strokeStyle = color;
  ctx.lineWidth = lineW||2;
  ctx.stroke();
}

function drawLine(p3a, p3b, color, lw, dash) {
  const a = proj(p3a);
  const b = proj(p3b);
  ctx.beginPath();
  ctx.moveTo(a[0], a[1]);
  ctx.lineTo(b[0], b[1]);
  ctx.strokeStyle = color;
  ctx.lineWidth = lw||1.5;
  if (dash) ctx.setLineDash(dash); else ctx.setLineDash([]);
  ctx.stroke();
  ctx.setLineDash([]);
}

function drawPoly(pts3, strokeColor, fillColor, lw, dash) {
  if (pts3.length < 2) return;
  const proj2 = pts3.map(p => proj(p));
  ctx.beginPath();
  ctx.moveTo(proj2[0][0], proj2[0][1]);
  for (let i = 1; i < proj2.length; i++) ctx.lineTo(proj2[i][0], proj2[i][1]);
  ctx.closePath();
  if (fillColor) { ctx.fillStyle = fillColor; ctx.fill(); }
  if (strokeColor) {
    ctx.strokeStyle = strokeColor;
    ctx.lineWidth = lw||1.5;
    if (dash) ctx.setLineDash(dash); else ctx.setLineDash([]);
    ctx.stroke();
    ctx.setLineDash([]);
  }
}

function dot(p3, color, r) {
  const p = proj(p3);
  ctx.beginPath();
  ctx.arc(p[0], p[1], r||4, 0, Math.PI*2);
  ctx.fillStyle = color;
  ctx.fill();
  return p;
}

function label(p3, text, color, offx, offy, align, size) {
  const p = proj(p3);
  ctx.font = (size||11)+'px Space Mono';
  ctx.textAlign = align||'center';
  ctx.textBaseline = 'middle';
  // Dark shadow so labels read clearly over any geometry or disc
  ctx.shadowColor = 'rgba(0, 0, 8, 0.95)';
  ctx.shadowBlur = 5;
  ctx.fillStyle = color||'#fff';
  ctx.fillText(text, p[0]+(offx||0), p[1]+(offy||0));
  ctx.shadowColor = 'transparent';
  ctx.shadowBlur = 0;
  ctx.textBaseline = 'alphabetic';
}

// Draw a sphere with 3D-correct day/night shading.
// cx, cy: screen center; r: radius in pixels
// L: normalized light direction in view space [x, y, z] (z toward viewer)
// baseColor: CSS color for the lit hemisphere
function drawShadedSphere(cx, cy, r, L, baseColor) {
  const lx = L[0];
  const ly = -L[1];  // flip: canvas y increases downward
  const lz = L[2];
  const lightAngle = Math.atan2(ly, lx);
  const absLz = Math.abs(lz);

  ctx.save();

  // Clip everything to the sphere outline
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.clip();

  // Fill lit hemisphere with base color
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fillStyle = baseColor;
  ctx.fill();

  // Draw the dark night-side overlay.
  // Rotate coordinate space so +x points toward the light source.
  // In this space the terminator ellipse has semi-major r along y and
  // semi-minor |lz|*r along x; the shadow occupies the x < 0 (left) half.
  ctx.translate(cx, cy);
  ctx.rotate(lightAngle);

  ctx.beginPath();
  ctx.moveTo(0, -r);
  // Shadow semicircle: left half (9-o'clock side) in canvas coords
  ctx.arc(0, 0, r, -Math.PI / 2, Math.PI / 2, true);
  // Terminator ellipse back to top
  if (absLz < 0.01) {
    ctx.lineTo(0, -r);               // light from side → straight terminator
  } else {
    // anticlockwise=true goes through 3-o'clock (+x, lit) side, which is correct for lz≥0.
    // anticlockwise=false goes through 9-o'clock (−x, shadow) side for lz<0.
    ctx.ellipse(0, 0, absLz * r, r, 0, Math.PI / 2, -Math.PI / 2, lz >= 0);
  }
  ctx.closePath();
  ctx.fillStyle = 'rgba(4, 8, 28, 0.78)';
  ctx.fill();

  ctx.restore();

  // Sphere rim
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255,255,255,0.35)';
  ctx.lineWidth = 1;
  ctx.stroke();
}

// Compute average Z depth of a polygon for painter's algorithm
function polyDepth(pts3) {
  const rot = pts3.map(p => applyRot(p, rotX, rotY));
  return rot.reduce((s,p) => s+p[2], 0) / rot.length;
}

function render() {
  const rect = canvas.getBoundingClientRect();
  const cw = Math.round(rect.width);
  const ch = Math.round(rect.height);
  if (!cw || !ch) return;
  canvas.width  = cw;
  canvas.height = ch;
  ctx.clearRect(0, 0, W(), H());

  // Fill dark background explicitly so iframe white doesn't show through
  ctx.fillStyle = '#03040c';
  ctx.fillRect(0, 0, W(), H());

  // Draw starfield before all 3D elements so the model renders on top.
  // Fractional x/y positions scale to current canvas dimensions each frame,
  // so the field always covers the full canvas after resize or orientation change.
  stars.forEach(s => {
    ctx.beginPath();
    ctx.arc(s.x * W(), s.y * H(), s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${s.a})`;
    ctx.fill();
  });

  // Scale so the model fills the full-width canvas at any aspect ratio.
  // W() * 0.40 prevents over-scaling on very wide screens; H() * 0.44 is the
  // binding constraint in typical landscape, producing ~7% larger model than
  // the old sidebar layout. In portrait the W term takes over automatically.
  const SCALE = Math.min(W() * 0.40, H() * 0.44) * zoom;

  const GAL_R   = 1.15;  // galactic disk radius — larger (+15%)
  const CEQ_R   = 0.17;  // celestial equator radius — smaller (-15%)
  const ORBIT_R = 0.15;  // Earth orbit/ecliptic radius — smaller (-15%)
  const AXIS_L  = 0.62;  // galactic N/S axis — scales with disk
  const ROT_L   = 0.24;  // rotation axis half-length — slightly smaller
  const ARROW_L = 0.52;  // seasonal view arrow length

  // Scale all geometry
  const s = SCALE;
  function sv(v) { return scale3(v, s); }
  function sp(p) { return scale3(p, s); }  // scale a position

  // ── Build draw list with depth for painter's algorithm ────────
  const drawList = [];

  // Helper to push an item
  function push(depth, fn) { drawList.push({depth, fn}); }

  // ── Galactic plane ──────────────────────────────────────────
  const galPts = makeDisc(0,0,0, GAL_R, GAL_R, 72).map(p=>sv(p));
  push(polyDepth(galPts.slice(0,4)), () => {
    drawPoly(galPts, 'rgba(245,166,35,0.75)', 'rgba(245,166,35,0.07)', 1.5);
  });

  // Galactic disk faint Z-orientation line
  push(0, () => {
    drawLine(sv([0,0,-GAL_R]), sv([0,0,GAL_R]), 'rgba(245,166,35,0.12)', 1, [6,6]);
  });

  // Core glow — at galactic centre [0,0,0], distinct amber/orange
  push(0, () => {
    const cp = proj(sv(CORE_POS));
    const gr = ctx.createRadialGradient(cp[0],cp[1],0,cp[0],cp[1],s*0.14);
    gr.addColorStop(0,   'rgba(90,180,255,1)');
    gr.addColorStop(0.25,'rgba(60,140,255,0.8)');
    gr.addColorStop(0.6, 'rgba(30,80,200,0.3)');
    gr.addColorStop(1,   'rgba(30,80,200,0)');
    ctx.beginPath(); ctx.arc(cp[0],cp[1],s*0.14,0,Math.PI*2);
    ctx.fillStyle = gr; ctx.fill();
    ctx.beginPath(); ctx.arc(cp[0],cp[1],5,0,Math.PI*2);
    ctx.fillStyle='#5ab4ff'; ctx.fill();
    label(sv(CORE_POS), 'GALACTIC CORE', 'rgba(90,180,255,0.95)', 0, s*-0.24, 'center', 12);
    label(sv(CORE_POS), '(Sagittarius)', 'rgba(130,190,255,0.6)', 0, s*-0.18, 'center', 10);
  });

  // ── Galactic N/S axis ───────────────────────────────────────
  push(0, () => {
    drawLine(sv(CORE_POS), sv([0,AXIS_L,0]), 'rgba(100,181,246,0.6)', 1.5, [5,5]);
    drawLine(sv(CORE_POS), sv([0,-AXIS_L,0]),'rgba(239,154,154,0.6)', 1.5, [5,5]);
    dot(sv([0,AXIS_L,0]),  '#64b5f6', 4);
    dot(sv([0,-AXIS_L,0]), '#ef9a9a', 4);
    label(sv([0,AXIS_L*1.08,0]),  'GAL. NORTH', '#64b5f6', 0, -s*0.04, 'center', 11);
    label(sv([0,-AXIS_L*1.08,0]), 'GAL. SOUTH', '#ef9a9a', 0,  s*0.04, 'center', 11);
  });

  // Z-axis cross line (faint orientation guide only)
  push(0, () => {
    drawLine(sv([0,0,-GAL_R]), sv([0,0,GAL_R]), 'rgba(245,166,35,0.12)', 1, [6,6]);
  });

  // ── Earth orbit = ecliptic plane — centred on SUN_POS ─────────
  // This ellipse IS the ecliptic — Earth's seasonal positions lie on it.
  // The separate larger ecliptic disc has been removed as redundant.
  const orbitPts = makeOrbit(ORBIT_R, 64).map(p=>sv(p));

  // ── Pre-compute orbit screen extents for label placement ───────
  // The ecliptic ring is projected to an ellipse whose screen-space extents
  // vary with rotation. We measure them once per frame so that the EARTH, SUN,
  // and ECLIPTIC labels can be positioned OUTSIDE the projected ellipse at all
  // rotation angles, preventing overlap with the ring line.
  const _sunScrn   = proj(sv(SUN_POS));
  const _projOrbit = orbitPts.map(p => proj(p));
  let _orbTopY = Infinity, _orbBotY = -Infinity;
  let _orbFarIdx = 0, _orbFarDist = -Infinity;
  _projOrbit.forEach((p, i) => {
    if (p[1] < _orbTopY) _orbTopY = p[1];
    if (p[1] > _orbBotY) _orbBotY = p[1];
    // Track the orbit point furthest from the Sun/Earth dot in screen space —
    // this becomes the anchor for the ECLIPTIC label, keeping it on the ring
    // rim but as far from the crowded Earth/Sun/label cluster as possible.
    const dx = p[0] - _sunScrn[0], dy = p[1] - _sunScrn[1];
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist > _orbFarDist) { _orbFarDist = dist; _orbFarIdx = i; }
  });
  // Fixed pixel clearance between the ring edge and the nearest label edge.
  // 16 px is enough to read clearly without pushing labels too far at any
  // viewport size (the ring stroke is only 1.4 px wide).
  const RING_PAD = 16;


  push(polyDepth(orbitPts.slice(0,4)), () => {
    drawPoly(orbitPts, 'rgba(165,214,167,0.7)', 'rgba(165,214,167,0.04)', 1.4, [3,4]);
    // ECLIPTIC label removed — ring is self-evident.
  });

  const eu = EARTH_POS;

  // ── Sun — at SUN_POS (offset from galactic core) ────────────
  // depth 1 so the sun dot renders on top of the Earth dot (depth 0)
  push(1, () => {
    const sp2 = proj(sv(SUN_POS));
    const sg = ctx.createRadialGradient(sp2[0],sp2[1],0,sp2[0],sp2[1],s*0.055);
    sg.addColorStop(0,   'rgba(255,224,60,1)');
    sg.addColorStop(0.45,'rgba(255,160,0,0.65)');
    sg.addColorStop(1,   'rgba(255,100,0,0)');
    ctx.beginPath(); ctx.arc(sp2[0],sp2[1],s*0.055,0,Math.PI*2);
    ctx.fillStyle = sg; ctx.fill();
    ctx.beginPath(); ctx.arc(sp2[0],sp2[1],7,0,Math.PI*2);
    ctx.fillStyle='#ffe066'; ctx.fill();
    // SUN label removed — the glowing dot is self-evident as the Sun.
  });

  // ── Earth ───────────────────────────────────────────────────
  push(0, () => {
    const ep = proj(sv(eu));
    const eg = ctx.createRadialGradient(ep[0],ep[1],0,ep[0],ep[1],s*0.055);
    eg.addColorStop(0,'rgba(168,216,234,0.85)');
    eg.addColorStop(1,'rgba(168,216,234,0)');
    ctx.beginPath(); ctx.arc(ep[0],ep[1],s*0.055,0,Math.PI*2);
    ctx.fillStyle=eg; ctx.fill();
    ctx.beginPath(); ctx.arc(ep[0],ep[1],6,0,Math.PI*2);
    ctx.fillStyle='#a8d8ea'; ctx.fill();
    ctx.beginPath(); ctx.arc(ep[0],ep[1],6,0,Math.PI*2);
    ctx.strokeStyle='rgba(255,255,255,0.8)'; ctx.lineWidth=1.5; ctx.stroke();
    // EARTH label: place above the topmost point of the projected orbit ring.
    // textBaseline is 'middle', so subtract half the font height so the text
    // bottom sits RING_PAD above the ring's highest screen pixel.
    const _earthLabelOffy = _orbTopY - RING_PAD - 6 - ep[1];
    label(sv(eu), 'EARTH', 'rgba(255,255,255,0.75)', -20, _earthLabelOffy, 'center', 12);
    // Secondary Earth label: positioned as a subtitle 14 px below the EARTH label,
    // and s*0.34 ≈ 111 px to the right — well outside the ring's ~37 px rightmost
    // screen extent, so no overlap risk with the ring or the centred EARTH label.
    // disabled for now — for future implementation
    // label(sv(eu), 'Orion Spur, ~26kly from core', 'rgba(255,255,255,0.65)', s*0.34, _earthLabelOffy + 14, 'left', 9);
  });

  // ── Seasonal view arrows ─────────────────────────────────────
  SEASONS.forEach((s2, i) => {
    if (!seasonVisible[i]) return;
    const ePos = earthOnOrbit(s2.orbitAngle, ORBIT_R);
    const ePosS = sv(ePos);
    const arrowTip = nightViewArrow(ePos, scale3(s2.galBias, 0.5), ARROW_L);
    const arrowTipS = sv(arrowTip);

    // Earth position on orbit
    const capturedEPos = ePos;
    push(0, () => {
      // Compute sun-to-earth light direction in view space for this season
      const toSun = normalize([
        SUN_POS[0] - capturedEPos[0],
        SUN_POS[1] - capturedEPos[1],
        SUN_POS[2] - capturedEPos[2]
      ]);
      const L = applyRot(toSun, rotX, rotY);
      const ep_s = proj(ePosS);
      drawShadedSphere(ep_s[0], ep_s[1], 12.75, L, s2.color); // -15% radius
      drawArrow(ePosS, arrowTipS, s2.color, 2, 10);
      label(arrowTipS, s2.name, s2.color, 0, s*(s2.labelOffY ?? -0.08), 'center', 16);
      label(arrowTipS, s2.quadrant, 'rgba(255,255,255,0.75)', 0, s*(s2.quadrantOffY ?? 0.10), 'center', 16);

      // Small line from sun to Earth position (to show orbital connection)
      drawLine(sv(SUN_POS), ePosS, 'rgba(255,255,255,0.12)', 1, [2,4]);

      // ── Earth rotation axis indicator (all seasons) ──────────────
      // Shows Earth's rotation axis as two short stubs protruding from the
      // north and south poles of the sphere, plus a small CCW curved arrow
      // at the north tip. Same rotAxisN orientation and styling for all seasons.
      {
        // The sphere is drawn at a fixed 15 screen-px radius regardless of
        // zoom. Converting to unit space: poleOffset = (15+margin) / s ensures
        // the stubs start visually outside the sphere at all zoom levels.
        const poleOffset = (12.75 + 3) / s;   // unit-space offset to clear sphere
        const stubLen    = 10 / s;          // stub length (≈10 screen px)

        // North pole stub end-points in unit space, along +rotAxisN
        const nBase = [
          capturedEPos[0] + rotAxisN[0] * poleOffset,
          capturedEPos[1] + rotAxisN[1] * poleOffset,
          capturedEPos[2] + rotAxisN[2] * poleOffset,
        ];
        const nTip = [
          capturedEPos[0] + rotAxisN[0] * (poleOffset + stubLen),
          capturedEPos[1] + rotAxisN[1] * (poleOffset + stubLen),
          capturedEPos[2] + rotAxisN[2] * (poleOffset + stubLen),
        ];
        // South pole stub end-points along -rotAxisN
        const sBase = [
          capturedEPos[0] - rotAxisN[0] * poleOffset,
          capturedEPos[1] - rotAxisN[1] * poleOffset,
          capturedEPos[2] - rotAxisN[2] * poleOffset,
        ];
        const sTip = [
          capturedEPos[0] - rotAxisN[0] * (poleOffset + stubLen),
          capturedEPos[1] - rotAxisN[1] * (poleOffset + stubLen),
          capturedEPos[2] - rotAxisN[2] * (poleOffset + stubLen),
        ];

        const axisColor = 'rgba(255,255,255,0.65)';
        drawLine(sv(nBase), sv(nTip), axisColor, 1.5);
        drawLine(sv(sBase), sv(sTip), axisColor, 1.5);

        // ── CCW rotation arc at north tip ─────────────────────────────
        // Build an orthonormal basis {uVec, vVec} for the plane perpendicular
        // to rotAxisN. By construction cross(uVec, vVec) = rotAxisN, so
        // increasing arc angle is CCW when viewed from the +rotAxisN side
        // (Earth's north pole) — matching Earth's actual west-to-east rotation.
        let uVec = cross3(rotAxisN, [0, 1, 0]);
        if (dot3(uVec, uVec) < 0.001) uVec = cross3(rotAxisN, [1, 0, 0]);
        uVec = normalize(uVec);
        const vVec = normalize(cross3(rotAxisN, uVec));

        const arcR    = 7.9 / s;          // arc radius ≈ 7.9 screen px (+15% diameter)
        const arcGap  = Math.PI * 0.22;  // gap at non-arrow end, keeping arrowhead visually separate
        const arcSpan = Math.PI * 2 - arcGap;
        const arcSegs = 16;
        const arcColor = 'rgba(255,255,255,0.6)';

        // Helper: 3D point on the arc at angle t, centered on nTip
        const mkArcPt = t => [
          nTip[0] + arcR * (Math.cos(t) * uVec[0] + Math.sin(t) * vVec[0]),
          nTip[1] + arcR * (Math.cos(t) * uVec[1] + Math.sin(t) * vVec[1]),
          nTip[2] + arcR * (Math.cos(t) * uVec[2] + Math.sin(t) * vVec[2]),
        ];

        // Draw arc as 3D line segments so it foreshortens with rotation
        for (let k = 0; k < arcSegs; k++) {
          const t0 = arcGap + arcSpan * (k       / arcSegs);
          const t1 = arcGap + arcSpan * ((k + 1) / arcSegs);
          drawLine(sv(mkArcPt(t0)), sv(mkArcPt(t1)), arcColor, 1.2);
        }

        // Arrowhead at the arc end — drawn in screen space for clean look.
        // Sample two nearby arc points to derive the screen-space tangent.
        const tEnd  = arcGap + arcSpan;
        const scrnEnd = proj(sv(mkArcPt(tEnd)));
        const scrnPre = proj(sv(mkArcPt(tEnd - 0.18)));
        const adx = scrnEnd[0] - scrnPre[0], ady = scrnEnd[1] - scrnPre[1];
        const alen = Math.sqrt(adx * adx + ady * ady);
        if (alen > 0.5) {
          const atx = adx / alen, aty = ady / alen;  // tangent unit vector
          const anx = -aty,       any = atx;          // normal to tangent
          // Solid filled triangle arrowhead
          const hs = 4;   // arrowhead half-size in pixels
          ctx.beginPath();
          ctx.moveTo(scrnEnd[0] + atx * hs * 1.5,      scrnEnd[1] + aty * hs * 1.5);
          ctx.lineTo(scrnEnd[0] - atx * hs + anx * hs, scrnEnd[1] - aty * hs + any * hs);
          ctx.lineTo(scrnEnd[0] - atx * hs - anx * hs, scrnEnd[1] - aty * hs - any * hs);
          ctx.closePath();
          ctx.fillStyle = arcColor;
          ctx.fill();
        }
      }
    });
  });

  // ── Sort by depth and draw ───────────────────────────────────
  drawList.sort((a,b) => a.depth - b.depth);
  drawList.forEach(item => item.fn());
}

// ═══════════════════════════════════════════════════════════════
//  INTERACTION
// ═══════════════════════════════════════════════════════════════

function onMouseDown(e) {
  dragging = true;
  lastX = e.clientX; lastY = e.clientY;
}
function onMouseMove(e) {
  if (!dragging) return;
  const dx = e.clientX - lastX;
  const dy = e.clientY - lastY;
  rotY += dx * 0.007;
  rotX += dy * 0.007;
  rotX = Math.max(-Math.PI*0.5, Math.min(Math.PI*0.5, rotX));
  lastX = e.clientX; lastY = e.clientY;
  render();
}
function onMouseUp() { dragging = false; }

function onWheel(e) {
  e.preventDefault();
  zoom *= e.deltaY < 0 ? 1.08 : 0.93;
  zoom = Math.max(0.3, Math.min(4, zoom));
  render();
}

// Touch support
let lastTouchDist = null;
function onTouchStart(e) {
  if (e.touches.length === 1) {
    dragging = true;
    lastX = e.touches[0].clientX;
    lastY = e.touches[0].clientY;
  }
  if (e.touches.length === 2) {
    lastTouchDist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
  }
}
function onTouchMove(e) {
  e.preventDefault();
  if (e.touches.length === 1 && dragging) {
    const dx = e.touches[0].clientX - lastX;
    const dy = e.touches[0].clientY - lastY;
    rotY += dx * 0.007;
    rotX += dy * 0.007;
    rotX = Math.max(-Math.PI*0.5, Math.min(Math.PI*0.5, rotX));
    lastX = e.touches[0].clientX;
    lastY = e.touches[0].clientY;
    render();
  }
  if (e.touches.length === 2 && lastTouchDist) {
    const dist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    zoom *= dist / lastTouchDist;
    zoom = Math.max(0.3, Math.min(4, zoom));
    lastTouchDist = dist;
    render();
  }
}
function onTouchEnd() { dragging = false; lastTouchDist = null; }

canvas.addEventListener('mousedown', onMouseDown);
window.addEventListener('mousemove', onMouseMove);
window.addEventListener('mouseup', onMouseUp);
canvas.addEventListener('wheel', onWheel, {passive: false});
canvas.addEventListener('touchstart', onTouchStart, {passive: false});
canvas.addEventListener('touchmove', onTouchMove, {passive: false});
canvas.addEventListener('touchend', onTouchEnd);

// Full reset — mirrors what page load does: restore default view state then render.
// Used by the resize/orientationchange handlers so that a window resize in Safari
// produces an identical result to a manual page refresh.
function fullReset() {
  rotX = DEFAULT_RX; rotY = DEFAULT_RY; zoom = 1.0;
  render();
}

// ═══════════════════════════════════════════════════════════════
//  RESIZE & LIFECYCLE
//  Uses window resize / orientationchange instead of ResizeObserver
//  on the canvas element. Observing the canvas caused a render loop
//  on Chrome: setting canvas.width inside render() re-triggered the
//  observer on every frame, producing continuous redraws and visible
//  model drift. window resize events do not have this problem.
// ═══════════════════════════════════════════════════════════════

let resizeTimer = null;

function scheduleReset(delay) {
  if (resizeTimer) clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    resizeTimer = null;
    requestAnimationFrame(fullReset);
  }, delay);
}

window.addEventListener('resize', () => scheduleReset(150));
window.addEventListener('orientationchange', () => scheduleReset(275));

// Initial render — one rAF lets the browser complete layout so
// getBoundingClientRect() inside render() returns settled dimensions.
requestAnimationFrame(() => render());
</script>
</body>
</html>
